name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABASE_URL: file:./dev.db
      JWT_SECRET: github-actions-mobile-build-secret
      JWT_EXPIRES_IN: 7d
      PORT: 4000
      CLIENT_URL: http://localhost:3000
      UPLOAD_DIR: ./uploads
      NEXT_PUBLIC_API_URL: https://tamayoz-chat-api.onrender.com
      NEXT_PUBLIC_SOCKET_URL: https://tamayoz-chat-api.onrender.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace backend

      - name: Build and sync mobile app
        run: npm run mobile:build

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ALMAJD-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
