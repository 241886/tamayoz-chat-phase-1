services:
  - type: web
    name: nexus-api
    runtime: node
    rootDir: backend
    region: singapore
    plan: starter
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start:render
    healthCheckPath: /health
    disk:
      name: nexus-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: file:/var/data/nexus.db
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false
