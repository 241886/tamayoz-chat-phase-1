<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#c87aff" />
    <title>ALMAJD Offline</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 18% 12%, rgba(200, 122, 255, 0.22), transparent 26rem),
          radial-gradient(circle at 82% 18%, rgba(255, 110, 180, 0.16), transparent 24rem),
          #0d0d12;
        color: rgba(255, 255, 255, 0.92);
        font-family: "DM Sans", Arial, sans-serif;
      }

      main {
        width: min(90vw, 380px);
        padding: 32px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.055);
        box-shadow: 0 24px 90px rgba(200, 122, 255, 0.16);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        background: linear-gradient(135deg, #c87aff, #ff6eb4);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      p {
        margin: 12px 0 0;
        color: rgba(255, 255, 255, 0.52);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ALMAJD</h1>
      <p>You are offline. Reconnect to continue real-time chat.</p>
    </main>
  </body>
</html>
